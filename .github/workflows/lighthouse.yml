name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI (Mobile)
        run: npx lhci autorun --config=.lighthouserc.mobile.cjs
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Save mobile results
        run: |
          cp .lighthouseci/manifest.json .lighthouseci/manifest.mobile.json 2>/dev/null || true
          cp .lighthouseci/links.json .lighthouseci/links.mobile.json 2>/dev/null || true

      - name: Run Lighthouse CI (Desktop)
        run: npx lhci autorun --config=.lighthouserc.desktop.cjs
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Save desktop results
        run: |
          cp .lighthouseci/manifest.json .lighthouseci/manifest.desktop.json 2>/dev/null || true
          cp .lighthouseci/links.json .lighthouseci/links.desktop.json 2>/dev/null || true

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const score = (val) => Math.round((val ?? 0) * 100);
            const badge = (s) => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';

            function buildSection(manifestPath, linksPath) {
              if (!fs.existsSync(manifestPath)) return null;

              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              const run = manifest.find(r => r.isRepresentativeRun);
              if (!run) return null;

              const s = run.summary;
              const perf = score(s.performance);
              const a11y = score(s.accessibility);
              const bp   = score(s['best-practices']);
              const seo  = score(s.seo);

              let section = '';
              section += `| Category | Score |\n`;
              section += `|:---|:---:|\n`;
              section += `| ${badge(perf)} Performance | **${perf}** |\n`;
              section += `| ${badge(a11y)} Accessibility | **${a11y}** |\n`;
              section += `| ${badge(bp)} Best Practices | **${bp}** |\n`;
              section += `| ${badge(seo)} SEO | **${seo}** |\n\n`;

              if (fs.existsSync(linksPath)) {
                const links = JSON.parse(fs.readFileSync(linksPath, 'utf8'));
                const reportUrls = Object.values(links);
                if (reportUrls.length > 0) {
                  section += `[📄 Full Report](${reportUrls[0]})\n\n`;
                }
              }

              return section;
            }

            const mobile = buildSection(
              '.lighthouseci/manifest.mobile.json',
              '.lighthouseci/links.mobile.json'
            );
            const desktop = buildSection(
              '.lighthouseci/manifest.desktop.json',
              '.lighthouseci/links.desktop.json'
            );

            if (!mobile && !desktop) {
              console.log('No results found, skipping comment');
              return;
            }

            let body = '## ⚡ Lighthouse CI Results\n\n';
            if (mobile) body += '### 📱 Mobile\n\n' + mobile;
            if (desktop) body += '### 🖥️ Desktop\n\n' + desktop;
            body += `> 🤖 Powered by [Lighthouse CI](https://github.com/GoogleChrome/lighthouse-ci)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## ⚡ Lighthouse CI Results';
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
