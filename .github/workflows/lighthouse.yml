name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const manifestPath = '.lighthouseci/manifest.json';
            if (!fs.existsSync(manifestPath)) {
              console.log('manifest.json not found, skipping comment');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const run = manifest.find(r => r.isRepresentativeRun);
            if (!run) {
              console.log('No representative run found, skipping comment');
              return;
            }

            const score = (val) => Math.round((val ?? 0) * 100);
            const badge = (s) => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';

            const s = run.summary;
            const perf = score(s.performance);
            const a11y = score(s.accessibility);
            const bp   = score(s['best-practices']);
            const seo  = score(s.seo);

            let body = '## ⚡ Lighthouse CI Results\n\n';
            body += `| Category | Score |\n`;
            body += `|:---|:---:|\n`;
            body += `| ${badge(perf)} Performance | **${perf}** |\n`;
            body += `| ${badge(a11y)} Accessibility | **${a11y}** |\n`;
            body += `| ${badge(bp)} Best Practices | **${bp}** |\n`;
            body += `| ${badge(seo)} SEO | **${seo}** |\n\n`;

            const linksPath = '.lighthouseci/links.json';
            if (fs.existsSync(linksPath)) {
              const links = JSON.parse(fs.readFileSync(linksPath, 'utf8'));
              const reportUrls = Object.values(links);
              if (reportUrls.length > 0) {
                body += `[📄 Full Report](${reportUrls[0]})\n\n`;
              }
            }

            body += `> 🤖 Powered by [Lighthouse CI](https://github.com/GoogleChrome/lighthouse-ci)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## ⚡ Lighthouse CI Results';
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
