version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      vite:
        patterns:
          - 'vite'
          - 'rolldown-vite'
          - '@vitejs/*'
          - 'vite-*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'globals'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      prettier:
        patterns:
          - 'prettier'
          - '@trivago/prettier-plugin-sort-imports'
      commitizen:
        patterns:
          - 'commitizen'
          - 'cz-customizable'
          - '@commitlint/*'
      husky:
        patterns:
          - 'husky'
          - 'lint-staged'
    ignore:
      - dependency-name: 'vite'
        versions:
          - '>= 7'
